<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>小闪智能记账 - 极简AI记账与理财分析</title>
    
    <!-- PWA Manifest & Colors -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- iOS PWA Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="小闪记账" />
    <link rel="apple-touch-icon" href="/icon.png" />
    
    <!-- Standard PWA Icon -->
    <link rel="icon" type="image/png" href="/icon.png" />
  </head>
  <body class="bg-slate-50 selection:bg-emerald-500/30">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker — 使用固定 URL，禁止 Date.now() 会导致每页载入都刷新 -->
    <script>
      if ('serviceWorker' in navigator) {
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        
        if (!isDev) {
          window.addEventListener('load', () => {
            // 使用固定 URL 注册 SW（不加时间戳！否则每页载入都算"新版本"导致死循环刷新）
            navigator.serviceWorker.register('/sw.js')
              .then((reg) => {
                console.log('Service Worker 注册成功:', reg.scope);
                
                // 跳过非首次注册的更新检测 — 只在新 SW 真正更新时 reload
                if (reg.waiting && !navigator.serviceWorker.controller) {
                  // 首次激活，正常
                }
              })
              .catch((err) => console.error('Service Worker 注册失败:', err));

            // 监听新 SW 安装（后台静默更新，不强制刷新页面）
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              console.log('新版本 Service Worker 已激活。');
            });
          });
        } else {
          console.log('开发模式，跳过 Service Worker 注册以便 HMR 正常工作');
        }
      }
    </script>
  </body>
</html>
